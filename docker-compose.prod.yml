version: '3.8'

# =============================================================================
# Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ============ INFRASTRUCTURE — Memory Limits ============

  postgres-auth:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-user:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-listing:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-offer:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-trade:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-reputation:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-dispute:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-certificate:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-shipping:
    deploy:
      resources:
        limits:
          memory: 256M

  postgres-payment:
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    deploy:
      resources:
        limits:
          memory: 128M

  rabbitmq:
    deploy:
      resources:
        limits:
          memory: 384M

  # ============ SERVICES — Production Env + Limits ============

  api-gateway:
    environment:
      - TYPEORM_SYNCHRONIZE=false
      - DB_LOGGING=false
    deploy:
      resources:
        limits:
          memory: 384M

  auth-service:
