      - TYPEORM_SYNCHRONIZE=false
      - DB_LOGGING=false
    deploy:
      resources:
        limits:
          memory: 384M

  listing-service:
    environment:
      - TYPEORM_SYNCHRONIZE=false
      - DB_LOGGING=false
    deploy:
      resources:
        limits:
          memory: 384M

  offer-service:
    environment:
      - TYPEORM_SYNCHRONIZE=false
      - DB_LOGGING=false
    deploy:
      resources:
        limits:
          memory: 384M

  trade-service:
    environment:
      - TYPEORM_SYNCHRONIZE=false
      - DB_LOGGING=false
    deploy:
      resources:
        limits:
          memory: 512M

  reputation-service:
    environment:
      - TYPEORM_SYNCHRONIZE=false
      - DB_LOGGING=false
